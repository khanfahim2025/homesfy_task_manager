# /etc/nginx/sites-available/taskmanager
# Replace tasks.homesfy.in with your domain or use the EC2 public IP for testing.

server {
    listen 80;
    server_name tasks.homesfy.in;

    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}

# After DNS points to this server:
#   sudo certbot --nginx -d tasks.homesfy.in
# Certbot will add the SSL server block automatically.
